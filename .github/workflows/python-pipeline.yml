name: Python Matrix & Artifact Demo

on:
  workflow_dispatch: # Allows manual trigger for classroom demo
  push:
    branches: [ main ]

jobs:
  # JOB 1: Test and Compute using Matrix Strategy
  compute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Demonstrates scaling across versions and inputs
        python-version: ["3.10", "3.11"]
        numbers: ["10 20", "50 50"]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests
        # Students see that quality control happens before logic execution
        run: pytest tests/test_math.py

      - name: Run Math Script
        # Passing matrix values as arguments to our script
        run: python scripts/math_operations.py ${{ matrix.numbers }}

      - name: Upload Result as Artifact
        uses: actions/upload-artifact@v4
        with:
          # Matrix jobs must have unique artifact names to avoid overwriting
          name: math-result-${{ matrix.python-version }}-${{ strategy.job-index }}
          path: output/
          retention-days: 1

  # JOB 2: Download and Display
  summary:
    needs: compute # Essential: Tells GH Actions to wait for the matrix to finish
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          # Downloads all artifacts from the 'compute' job into one folder
          path: all-results

      - name: Display Final Results
        run: |
          echo "Aggregating all matrix results from different runners:"
          ls -R all-results
          echo "--- Content of results ---"
          cat all-results/**/*.txt
