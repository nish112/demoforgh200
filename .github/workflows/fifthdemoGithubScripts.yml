name: Fifth demo (Github Script Discussion Welcome Bot)

on:
  discussion:
    types: [created] # Triggers only when a new discussion starts

jobs:
  welcome-reply:
    runs-on: ubuntu-latest
    permissions:
      discussions: write # Crucial: The bot needs permission to post
    steps:
      - name: Post Welcome Message
        uses: actions/github-script@v7
        with:
          script: |
            // Define the message for your Lucknow students
            const welcomeMessage = `
              Hello @${context.payload.discussion.user.login}! 👋 
              
              Welcome to the **GH-200 Training Lab**. Your new discussion has been received! 
              
              This is an automated response generated by **GitHub Actions** to demonstrate the 'discussion' event trigger. Our team (or the instructor) will get back to you shortly.
            `;

            // Execute the API call to add a comment to the new discussion
            await github.rest.discussions.addDiscussionComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              discussion_number: context.payload.discussion.number,
              body: welcomeMessage
            });
