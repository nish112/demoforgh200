name: Third demo (GH-200 Matrix Dashboard (Unique Identity))

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Parallel Execution with Unique Naming
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        values: ["10 20", "40 60"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Execute Logic with Unique Filename
        run: |
          mkdir -p output
          # Define a unique filename using the matrix strategy index
          # This ensures we don't have 4 files all named "result.txt"
          FILENAME="result-job-${{ strategy.job-index }}.txt"
          
          echo "Processing ${{ matrix.values }} on Node ${{ matrix.node-version }}..."
          node src/math.js ${{ matrix.values }} > output/$FILENAME
          
          echo "Generated: $FILENAME"

      - name: Upload Unique Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Naming the container uniquely
          name: runner-data-${{ strategy.job-index }}
          path: output/
          retention-days: 1

  # JOB 2: Dashboard Generation
  summary:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: 📊 Generate Professional Summary
        run: |
          # Initialize the Markdown Dashboard
          echo "## 🚀 GH-200 Execution Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "This report aggregates unique data from **4 parallel runners**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Table Headers
          echo "| Artifact Source | Unique Filename | Math Result | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # Walk through the directory to find every unique result file
          find all-results -name "*.txt" | while read -r file; do
            FILE_NAME=$(basename "$file")
            # Get the parent folder name (e.g., runner-data-0)
            FOLDER_NAME=$(basename $(dirname "$file"))
            RESULT=$(cat "$file")
            
            # Append a clean row to the GitHub Summary table
            echo "| $FOLDER_NAME | \`$FILE_NAME\` | **$RESULT** | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---"
          echo "> **Training Note:** By using unique IDs, we avoid 'Namespace Collision' in shared storage." >> $GITHUB_STEP_SUMMARY
