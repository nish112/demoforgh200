name: Seventh Demo (Label Triggered Deployment)

on:
  pull_request:
    types: [labeled] # This is the specific event trigger

jobs:
  check-label-and-deploy:
    # We only want this job to run if the label is exactly "stage-deploy"
    if: github.event.label.name == 'stage-deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge Label
        run: |
          echo "Label detected: ${{ github.event.label.name }}"
          echo "Triggering deployment to Staging Environment..."

      - name: Simulate Deployment
        run: |
          # This is where your actual deployment scripts (Azure/AWS) would go
          echo "Deploying code from branch: ${{ github.head_ref }}"
          sleep 5
          echo "Deployment Successful! ✅"

      - name: Add Feedback Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🚀 **Auto-Deployment Started:** I detected the `stage-deploy` label. Your changes are being pushed to the staging server!"
            })
