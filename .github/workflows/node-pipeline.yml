name: First demo (Node.js Matrix & Artifact Demo)

on:
  workflow_dispatch: # Best for class: triggers the action manually from the UI
  push:
    branches: [ main ]

jobs:
  # JOB 1: Install, Test, and Run Logic
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Explaining Matrix: Runs 4 parallel jobs (2 versions x 2 sets of numbers)
        node-version: [18.x, 20.x]
        values: ["10 20", "40 60"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        # Use 'install' for the demo to dynamically generate the environment
        run: npm install

      - name: Run Tests
        # Demonstrates the CI (Continuous Integration) gate
        run: npm test

      - name: Run Logic Script
        # Executes your math.js with the matrix-provided numbers
        run: node src/math.js ${{ matrix.values }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Unique naming ensures matrix jobs don't overwrite each other
          name: result-${{ matrix.node-version }}-${{ strategy.job-index }}
          path: output/
          retention-days: 1

  # JOB 2: Aggregate results from the Matrix
  summary:
    needs: build-and-test # Tells GitHub to wait for all matrix jobs to finish
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-results

      - name: Display Summary
        # Show the class how data moved from one job to another
        run: |
          echo "Listing all files received from the 'build-and-test' job:"
          ls -R final-results
          echo "--- Combined Result Contents ---"
          cat final-results/**/*.txt
