name: Second Demo (Node.js Cache Strategy)

on:
  workflow_dispatch: # Allows manual trigger from the Actions UI
  push:
    branches: [ main ]

jobs:
  # JOB 1: Process math across 4 parallel runners
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        values: ["10 20", "40 60"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & Run Logic
        run: |
          npm install
          npm test
          # Infrastructure: Create output folder
          mkdir -p output
          # Execution: Pipe result to unique file based on matrix index
          node src/math.js ${{ matrix.values }} > output/result-${{ strategy.job-index }}.txt

      - name: Save to Cache
        # Using Cache Save instead of Upload Artifact
        uses: actions/cache/save@v4
        with:
          path: output/
          # Key uses run_id and job-index to ensure uniqueness and security
          key: math-cache-${{ github.run_id }}-${{ strategy.job-index }}

  # JOB 2: Aggregate results from all 4 Cache buckets
  summary:
    needs: build-and-test # Wait for the parallel matrix to finish
    runs-on: ubuntu-latest
    steps:
      - name: Create Landing Directories
        # CRITICAL FIX: Create the folders before restoring cache
        run: mkdir -p final-results/0 final-results/1 final-results/2 final-results/3

      - name: Restore Cache 0
        uses: actions/cache/restore@v4
        with:
          path: final-results/0
          key: math-cache-${{ github.run_id }}-0

      - name: Restore Cache 1
        uses: actions/cache/restore@v4
        with:
          path: final-results/1
          key: math-cache-${{ github.run_id }}-1

      - name: Restore Cache 2
        uses: actions/cache/restore@v4
        with:
          path: final-results/2
          key: math-cache-${{ github.run_id }}-2

      - name: Restore Cache 3
        uses: actions/cache/restore@v4
        with:
          path: final-results/3
          key: math-cache-${{ github.run_id }}-3

      - name: Display Summary
        run: |
          echo "Step 1: Listing restored cache structure..."
          ls -R final-results
          
          echo "Step 2: Displaying Combined Contents..."
          echo "------------------------------------------------"
          # Loop through all restored text files
          for file in final-results/**/*.txt; do
            [ -e "$file" ] || continue # Skip if no files exist
            echo "SOURCE: $file"
            echo "RESULT: $(cat "$file")"
            echo "------------------------------------------------"
          done
