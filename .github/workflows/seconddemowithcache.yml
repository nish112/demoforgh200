name: Second demo (Node.js Cache Strategy)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        values: ["10 20", "40 60"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & Run Logic
        run: |
          npm install
          npm test
          mkdir -p output
          # We name the file specifically by the job index here
          node src/math.js ${{ matrix.values }} > output/result-${{ strategy.job-index }}.txt

      - name: Save to Cache
        uses: actions/cache/save@v4
        with:
          path: output/
          key: math-cache-${{ github.run_id }}-${{ strategy.job-index }}

  summary:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      # We restore each cache into a unique local folder to avoid collisions
      - name: Restore Cache 0
        uses: actions/cache/restore@v4
        with:
          path: final-results/0
          key: math-cache-${{ github.run_id }}-0

      - name: Restore Cache 1
        uses: actions/cache/restore@v4
        with:
          path: final-results/1
          key: math-cache-${{ github.run_id }}-1

      - name: Restore Cache 2
        uses: actions/cache/restore@v4
        with:
          path: final-results/2
          key: math-cache-${{ github.run_id }}-2

      - name: Restore Cache 3
        uses: actions/cache/restore@v4
        with:
          path: final-results/3
          key: math-cache-${{ github.run_id }}-3

      - name: Display Summary
        run: |
          echo "Step 1: Listing restored cache structure..."
          # The -R (recursive) flag is key to seeing into the subfolders
          ls -R final-results
          
          echo "Step 2: Displaying Combined Contents..."
          echo "------------------------------------------------"
          # This wildcard pattern finds the .txt files regardless of depth
          find final-results -name "*.txt" -exec sh -c 'echo "FILE: {}"; echo "CONTENT: $(cat {})"; echo "------------------------------------------------"' \;
