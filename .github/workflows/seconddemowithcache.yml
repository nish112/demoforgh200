name: Second demo (cache)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-calculate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We use a single version to keep the logs clean for the demo
        node-version: [20.x]
        values: ["10 20"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: ⚡ Attempt Restore from GitHub Global Server
        # This highlights the "Restore" action. 
        # It reaches out to the central GitHub storage to find a match.
        id: cache-logic
        uses: actions/cache/restore@v4
        with:
          path: output/
          # The key is the 'Search Term'. If values change, the key changes.
          key: math-logic-${{ matrix.values }}

      - name: 🔨 Run Logic (On Cache Miss)
        # This step only runs if the 'Search Term' was NOT found on the server.
        if: steps.cache-logic.outputs.cache-hit != 'true'
        run: |
          echo "No cache found for ${{ matrix.values }}. Performing calculation..."
          mkdir -p output
          node src/math.js ${{ matrix.values }} > output/result.txt
          # Artificial delay to show the class that 'Work' is happening
          sleep 5 

      - name: ✅ Skip Logic (On Cache Hit)
        # This step only runs if the GitHub Server successfully sent the files back.
        if: steps.cache-logic.outputs.cache-hit == 'true'
        run: |
          echo "Cache Hit! The server sent back a 100% match."
          echo "The restored result from the server is: $(cat output/result.txt)"

      - name: 💾 Save to Global Server (On Cache Miss)
        # We only save if we actually performed the 'Work' in this run.
        if: steps.cache-logic.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: output/
          key: math-logic-${{ matrix.values }}
